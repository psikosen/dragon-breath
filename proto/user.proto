syntax = "proto3";

package dragonbreath.grpc;

message GetUserRequest {
  string id = 1;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string role = 3;
  string created_at = 4;
  string updated_at = 5;
}

message GetUserResponse {
  UserProfile user = 1;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}
